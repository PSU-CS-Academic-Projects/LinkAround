{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LinkAround{% endblock %}</title>
    {% tailwind_css %}
</head>
<body class="min-h-screen bg-base-200 text-base-content">
    <header class="navbar bg-base-100 shadow-sm border-b border-base-300 px-4 lg:px-8">
        <div class="navbar-start">
            <a href="{% url 'home' %}" class="btn btn-ghost text-lg font-semibold">LinkAround</a>
        </div>
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1 text-sm">
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'seeker_register' %}">For Seekers</a></li>
                <li><a href="{% url 'employer_register' %}">For Employers</a></li>
                <li><a href="{% url 'seeker_list' %}">Browse Portfolios</a></li>
            </ul>
        </div>
        <div class="navbar-end gap-2">
            <select id="theme-mode" class="select select-bordered select-sm" title="Choose theme mode">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
            </select>
            <label class="swap swap-rotate btn btn-ghost btn-sm" title="Quick toggle between light and dark">
                <input id="theme-toggle" type="checkbox" />
                <svg class="swap-off h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1Zm0 16a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1Zm10-6a1 1 0 0 1-1 1h-2a1 1 0 1 1 0-2h2a1 1 0 0 1 1 1ZM5 12a1 1 0 0 1-1 1H2a1 1 0 1 1 0-2h2a1 1 0 0 1 1 1ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Z"/></svg>
                <svg class="swap-on h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M21.64 13a1 1 0 0 0-1.05-.14 8 8 0 0 1-10.45-10.45 1 1 0 0 0-1.2-1.34 10 10 0 1 0 12.84 12.84 1 1 0 0 0-.14-1.05Z"/></svg>
            </label>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        {% if messages %}
            <div class="space-y-2 mb-4">
                {% for message in messages %}
                    <div class="alert alert-info shadow-sm">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script>
        (function () {
            const html = document.documentElement;
            const modeSelect = document.getElementById('theme-mode');
            const toggle = document.getElementById('theme-toggle');
            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            const THEME_MODE_KEY = 'linkaround-theme-mode';

            function resolveTheme(mode) {
                if (mode === 'dark') {
                    return 'dark';
                }
                if (mode === 'light') {
                    return 'corporate';
                }
                return mediaQuery.matches ? 'dark' : 'corporate';
            }

            function applyTheme(mode) {
                const resolvedTheme = resolveTheme(mode);
                html.setAttribute('data-theme', resolvedTheme);

                if (toggle) {
                    toggle.checked = resolvedTheme === 'dark';
                }

                if (modeSelect) {
                    modeSelect.value = mode;
                }
            }

            function setMode(mode) {
                localStorage.setItem(THEME_MODE_KEY, mode);
                applyTheme(mode);
            }

            const initialMode = localStorage.getItem(THEME_MODE_KEY) || 'system';
            applyTheme(initialMode);

            if (modeSelect) {
                modeSelect.addEventListener('change', function () {
                    setMode(modeSelect.value);
                });
            }

            if (toggle) {
                toggle.addEventListener('change', function () {
                    const nextMode = toggle.checked ? 'dark' : 'light';
                    setMode(nextMode);
                });
            }

            mediaQuery.addEventListener('change', function () {
                const mode = localStorage.getItem(THEME_MODE_KEY) || 'system';
                if (mode === 'system') {
                    applyTheme('system');
                }
            });
        })();
    </script>
</body>
</html>
